<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ============================================================
    OG / 社群預覽設定（貼到 LINE、iMessage 時出現的卡片）
    修改這裡 ↓
  ============================================================ -->
  <meta property="og:title"       content="何彥璟 — CodeCraft Co., Ltd.">
  <meta property="og:description" content="企業升級的夥伴，新創起飛的推手">
  <meta property="og:image"       content="https://your-domain.com/og-image.png"> <!-- 換成你的 OG 圖片 URL -->
  <meta property="og:url"         content="https://your-domain.com">              <!-- 換成你的名片網址 -->
  <meta property="og:type"        content="website">
  <meta name="twitter:card"       content="summary_large_image">

  <title>何彥璟 — CodeCraft Co., Ltd.</title>  <!-- 瀏覽器分頁標題 -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    /* ============================================================
      顏色設定 — 統一在這裡改，全站同步
    ============================================================ */
    :root {
      --bg-page:        #0d0b14;   /* 頁面底色 */
      --bg-card:        #16121f;   /* 名片底色 */
      --accent-1:       #8b5cf6;   /* 主強調色（紫） */
      --accent-2:       #ec4899;   /* 副強調色（粉） */
      --accent-3:       #f59e0b;   /* 第三色（琥珀，logo 右面用） */
      --border-subtle:  rgba(255,255,255,0.07);
      --text-primary:   #ffffff;
      --text-secondary: rgba(255,255,255,0.72);
      --text-muted:     rgba(255,255,255,0.50);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: var(--bg-page);
      padding: 2rem 1rem;
      font-family: 'DM Sans', 'Noto Sans TC', 'PingFang TC', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ---- 名片容器 ---- */
    .card {
      width: 100%;
      max-width: 440px;
      background: var(--bg-card);
      border-radius: 18px;
      border: 1px solid var(--border-subtle);
      overflow: hidden;
      position: relative;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* 光暈背景 */
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 85% 5%,  rgba(139,92,246,0.22) 0%, transparent 55%),
        radial-gradient(ellipse at 5%  90%, rgba(236,72,153,0.12) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* 噪點質感 */
    .card::after {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 180px;
      pointer-events: none;
      z-index: 0;
    }

    .inner {
      position: relative;
      z-index: 1;
      padding: 2rem;
    }

    /* ---- 品牌列 ---- */
    .brand-row {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-bottom: 1.5rem;
      margin-bottom: 1.75rem;
      border-bottom: 1px solid var(--border-subtle);
    }

    .brand-top {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand-text { display: flex; flex-direction: column; gap: 3px; }

    .brand-en {
      font-family: 'Cormorant Garamond', 'Georgia', serif;
      font-weight: 600;
      font-size: 19px;
      color: var(--text-primary);
      letter-spacing: 0.02em;
      line-height: 1.2;
    }

    .brand-zh {
      font-family: 'Noto Sans TC', 'PingFang TC', sans-serif;
      font-size: 12.5px;
      font-weight: 300;
      color: var(--text-muted);
      letter-spacing: 0.18em;
    }

    /* ---- 專業領域標語 ---- */
    .specialty {
      font-family: 'Noto Sans TC', 'PingFang TC', sans-serif;
      font-size: 11.5px;
      font-weight: 400;
      color: var(--text-secondary);
      letter-spacing: 0.14em;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .specialty .sep {
      color: var(--accent-1);
      opacity: 0.7;
      font-weight: 300;
    }

    /* ---- 個人資訊 ---- */
    .person {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .person-info { flex: 1; }

    .person-name {
      font-family: 'Cormorant Garamond', 'Noto Sans TC', 'PingFang TC', serif;
      font-size: 28px;
      font-weight: 400;
      color: var(--text-primary);
      line-height: 1.2;
      margin-bottom: 5px;
    }

    .person-role {
      font-size: 12px;
      font-weight: 400;
      color: var(--text-secondary);
      letter-spacing: 0.07em;
    }

    /* ---- 頭像 ---- */
    .avatar-placeholder {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      flex-shrink: 0;
      background: linear-gradient(135deg, rgba(139,92,246,0.2), rgba(236,72,153,0.12));
      border: 1.5px dashed rgba(255,255,255,0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.6;
    }

    .avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      object-fit: cover;
      border: 1.5px solid rgba(255,255,255,0.15);
      flex-shrink: 0;
    }

    /* ---- 聯絡列 ---- */
    .contacts {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 1.5rem;
    }

    .contact-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .c-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.38;
    }

    .c-val {
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 300;
      letter-spacing: 0.01em;
      text-decoration: none;
      transition: color 0.2s;
    }
    .c-val:hover { color: var(--text-primary); }

    /* ---- slogan ---- */
    .tagline {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      font-weight: 300;
      margin-top: 8px;
      padding-left: 1px;
    }

    /* ---- 底部操作列 ---- */
    .actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 1.25rem;
      border-top: 1px solid var(--border-subtle);
      gap: 10px;
    }

    .btn-save {
      font-size: 11.5px;
      font-weight: 500;
      letter-spacing: 0.09em;
      color: #fff;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      border: none;
      border-radius: 8px;
      padding: 9px 20px;
      cursor: pointer;
      text-transform: uppercase;
      font-family: 'DM Sans', sans-serif;
      transition: opacity 0.2s, transform 0.15s;
      flex-shrink: 0;
    }
    .btn-save:hover  { opacity: 0.88; }
    .btn-save:active { transform: scale(0.97); }

    .qr-wrap { opacity: 0.45; flex-shrink: 0; }

    /* ---- RWD: 手機更緊湊 ---- */
    @media (max-width: 400px) {
      .inner               { padding: 1.5rem; }
      .brand-en            { font-size: 16px; }
      .person-name         { font-size: 24px; }
      .avatar-placeholder,
      .avatar              { width: 52px; height: 52px; }
    }
  </style>
</head>
